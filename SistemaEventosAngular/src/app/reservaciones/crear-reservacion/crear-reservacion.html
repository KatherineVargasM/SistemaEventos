<h3>Nueva Reservación</h3>
<form [formGroup]="reservacionForm" (ngSubmit)="onSubmit()">
  
  <div>
    <label>Evento:</label>
    <select formControlName="eventoId">
      <option value="" disabled>Seleccione un evento</option>
      <option *ngFor="let ev of eventos" [value]="ev.eventoId">
        {{ ev.nombre }} - {{ ev.fecha | date:'shortDate' }}
      </option>
    </select>
  </div>
  
  <div>
    <label>Cliente:</label>
    <select formControlName="clienteId">
      <option value="" disabled>Seleccione un cliente</option>
      <option *ngFor="let cli of clientes" [value]="cli.clienteId">
        {{ cli.nombre }} {{ cli.apellido }}
      </option>
    </select>
  </div>

  <button type="submit" [disabled]="reservacionForm.invalid">Reservar</button>
</form>

<div class="content-header">
    <h2 class="page-title">
        Editar Reservación
    </h2>
</div>

<div class="card-table">

<form (ngSubmit)="guardar()">

<div class="form-group">

<label>ID Evento</label>

<input
class="form-control"
type="number"
[(ngModel)]="reservacion.eventoId"
name="eventoId">

</div>

<div class="form-group">

<label>ID Cliente</label>

<input
class="form-control"
type="number"
[(ngModel)]="reservacion.clienteId"
name="clienteId">

</div>

<div class="form-group">

<label>Fecha</label>

<input
class="form-control"
type="date"
[(ngModel)]="reservacion.fechaReservacion"
name="fechaReservacion">

</div>

<div class="form-group">

<label>Estado</label>

<input
class="form-control"
[(ngModel)]="reservacion.estado"
name="estado">

</div>

<div class="form-actions">

<button class="btn btn-new">

Guardar

</button>

<button
type="button"
class="btn btn-details"
routerLink="/reservaciones">

Cancelar

</button>

</div>

</form>

</div>
